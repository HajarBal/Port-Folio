<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Spring Charms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo-area">
                <div class="logo-circle">🌿</div>
                <div class="site-name">Spring Charms</div>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Shop</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Contact Us</h1>
        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            
            <form action="#" method="post" style="flex: 2;">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Sarah Matine">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Sarah@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Tell us about the custom keychain you want..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div style="flex: 1; background: white; padding: 20px; border-radius: 15px; height: fit-content; box-shadow: var(--shadow);">
                <h2>Visit Us</h2>
                <p><strong>Address:</strong><br>Haj Fateh, Oulfa<br>Casablanca, Morocco</p>
                <p><strong>Email:</strong><br>hajar.22@gmail.com</p>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
                <h3>Opening Hours</h3>
                <p>Mon - Fri : 9h - 18h</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Spring Charms. <a href="legal.html">Legal Mentions</a></p>
    </footer>
</body>
</html>
